<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Netlify CMS</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
      min-height: 100vh; 
      padding: 1rem;
      font-size: 16px;
      line-height: 1.5;
    }
    
    *:focus-visible {
      outline: 3px solid #ffd700;
      outline-offset: 2px;
    }
    
    .app { 
      max-width: 1200px; 
      margin: 0 auto; 
    }
    
    .login { 
      background: white; 
      max-width: 100%; 
      margin: 2rem auto; 
      padding: 1.5rem; 
      border-radius: 10px; 
      box-shadow: 0 10px 40px rgba(0,0,0,0.2); 
    }
    
    .login h1 { 
      margin-bottom: 1.25rem; 
      color: #1a1a1a; 
      font-size: 1.5rem;
    }
    
    .login p { 
      color: #4a4a4a; 
      margin-bottom: 1.25rem; 
      line-height: 1.6; 
    }
    
    .login button { 
      width: 100%; 
      padding: 1rem; 
      background: #00ad9f; 
      color: white; 
      border: none; 
      border-radius: 5px; 
      font-size: 1rem; 
      cursor: pointer; 
      font-weight: 600; 
      transition: background 0.2s ease;
      min-height: 44px;
    }
    
    .login button:hover, .login button:focus { 
      background: #009688; 
    }
    
    .login .note { 
      margin-top: 1.25rem; 
      padding: 1rem; 
      background: #e6f3ff; 
      border-radius: 5px; 
      font-size: 0.875rem; 
      color: #004085; 
      border: 1px solid #b3d9ff;
    }
    
    .main { 
      background: white; 
      border-radius: 10px; 
      padding: 1.25rem; 
      box-shadow: 0 10px 40px rgba(0,0,0,0.1); 
    }
    
    .header { 
      display: flex; 
      justify-content: space-between; 
      align-items: flex-start;
      margin-bottom: 1.5rem; 
      flex-wrap: wrap; 
      gap: 1rem; 
    }
    
    .header h1 { 
      color: #1a1a1a; 
      font-size: 1.5rem; 
      flex: 1 1 100%;
    }
    
    .user-info { 
      display: flex; 
      align-items: center; 
      gap: 0.75rem; 
      color: #4a4a4a; 
      font-size: 0.875rem; 
      flex-wrap: wrap;
      width: 100%;
    }
    
    .user-info img { 
      width: 32px; 
      height: 32px; 
      border-radius: 50%; 
    }
    
    .tabs { 
      display: flex; 
      gap: 0.25rem; 
      margin-bottom: 1.25rem; 
      border-bottom: 2px solid #e5e7eb; 
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    
    .tab { 
      padding: 0.75rem 1rem; 
      background: none; 
      border: none; 
      cursor: pointer; 
      color: #4a4a4a; 
      font-size: 0.9375rem; 
      border-bottom: 3px solid transparent; 
      margin-bottom: -2px; 
      white-space: nowrap;
      min-height: 44px;
      transition: all 0.2s ease;
    }
    
    .tab.active { 
      color: #00ad9f; 
      border-bottom-color: #00ad9f; 
      font-weight: 600; 
    }
    
    .tab:hover, .tab:focus { 
      color: #00ad9f; 
      background: rgba(0, 173, 159, 0.05);
    }
    
    .buttons { 
      display: flex; 
      gap: 0.75rem; 
      flex-wrap: wrap; 
      margin-bottom: 1.25rem;
    }
    
    button { 
      padding: 0.75rem 1.25rem; 
      border: none; 
      border-radius: 5px; 
      cursor: pointer; 
      font-size: 0.875rem; 
      min-height: 44px;
      transition: all 0.2s ease;
      font-weight: 500;
    }
    
    .btn-primary { 
      background: #00ad9f; 
      color: white; 
    }
    
    .btn-primary:hover, .btn-primary:focus { 
      background: #009688; 
    }
    
    .btn-primary:disabled {
      background: #cccccc;
      cursor: not-allowed;
      color: #666666;
    }
    
    .btn-secondary { 
      background: #6c757d; 
      color: white; 
    }
    
    .btn-secondary:hover, .btn-secondary:focus { 
      background: #5a6268; 
    }
    
    .btn-outline { 
      background: white; 
      border: 2px solid #d1d5db; 
      color: #4a4a4a; 
    }
    
    .btn-outline:hover, .btn-outline:focus { 
      background: #f9fafb; 
      border-color: #9ca3af;
    }
    
    .btn-danger { 
      background: #dc3545; 
      color: white; 
    }
    
    .btn-danger:hover, .btn-danger:focus { 
      background: #c82333; 
    }
    
    .grid { 
      display: grid; 
      grid-template-columns: 1fr; 
      gap: 1.5rem; 
    }
    
    .section h2 { 
      color: #4a4a4a; 
      margin-bottom: 1rem; 
      font-size: 1.125rem; 
    }
    
    .post { 
      background: #f9fafb; 
      padding: 1rem; 
      margin-bottom: 0.75rem; 
      border-radius: 5px; 
      border-left: 4px solid transparent; 
    }
    
    .post.draft { 
      border-left-color: #fbbf24; 
      background: #fffbeb;
    }
    
    .post.synced { 
      border-left-color: #10b981; 
    }
    
    .post.note { 
      border-left-color: #8b5cf6; 
    }
    
    .post h3 { 
      color: #1a1a1a; 
      margin-bottom: 0.5rem; 
      font-size: 1rem; 
      line-height: 1.4;
    }
    
    .post-date { 
      color: #6b7280; 
      font-size: 0.8125rem; 
      margin-bottom: 0.75rem; 
    }
    
    .post-meta { 
      display: flex; 
      gap: 0.5rem; 
      font-size: 0.75rem; 
      color: #6b7280; 
      margin-bottom: 0.75rem; 
      flex-wrap: wrap;
    }
    
    .post-meta .badge { 
      padding: 0.25rem 0.5rem; 
      border-radius: 3px; 
      background: #e5e7eb; 
      font-weight: 500;
    }
    
    .post-meta .badge.mastodon { 
      background: #6364ff; 
      color: white; 
    }
    
    .post-meta .badge.threads { 
      background: #000000; 
      color: white; 
    }
    
    .post-actions { 
      display: flex; 
      gap: 0.75rem; 
      flex-wrap: wrap;
    }
    
    .post-actions button { 
      padding: 0.375rem 0.75rem; 
      font-size: 0.8125rem; 
      background: none; 
      border: none; 
      color: #00ad9f; 
      cursor: pointer; 
      text-decoration: underline;
      min-height: 44px;
    }
    
    .post-actions button:hover, .post-actions button:focus { 
      color: #009688; 
    }
    
    .post-actions .delete { 
      color: #dc3545; 
    }
    
    .post-actions .delete:hover, .post-actions .delete:focus {
      color: #c82333;
    }
    
    .empty { 
      color: #6b7280; 
      font-style: italic; 
      padding: 1rem;
    }
    
    .editor { 
      max-width: 100%; 
      margin: 0 auto; 
    }
    
    .editor h2 { 
      margin-bottom: 1.25rem; 
      color: #1a1a1a; 
      font-size: 1.25rem;
    }
    
    .form-group { 
      margin-bottom: 1.25rem; 
    }
    
    .form-group label { 
      display: block; 
      margin-bottom: 0.5rem; 
      color: #374151; 
      font-weight: 600; 
      font-size: 0.9375rem;
    }
    
    .form-group input, 
    .form-group textarea, 
    .form-group select { 
      width: 100%; 
      padding: 0.75rem; 
      border: 2px solid #d1d5db; 
      border-radius: 5px; 
      font-size: 1rem; 
      font-family: inherit;
      transition: border-color 0.2s ease;
    }
    
    .form-group input:focus, 
    .form-group textarea:focus, 
    .form-group select:focus {
      border-color: #00ad9f;
      outline: none;
    }
    
    .form-group textarea { 
      font-family: 'Courier New', monospace; 
      min-height: 200px; 
      resize: vertical;
    }
    
    .form-group textarea.short { 
      min-height: 120px; 
    }
    
    .char-count { 
      text-align: right; 
      font-size: 0.8125rem; 
      color: #6b7280; 
      margin-top: 0.375rem; 
    }
    
    .char-count.warning { 
      color: #d97706; 
      font-weight: 600;
    }
    
    .char-count.error { 
      color: #dc2626; 
      font-weight: 700;
    }
    
    .checkbox-group { 
      display: flex; 
      gap: 1.25rem; 
      margin-top: 0.75rem; 
      flex-wrap: wrap;
    }
    
    .checkbox-group label { 
      display: flex; 
      align-items: center; 
      gap: 0.5rem; 
      font-weight: normal; 
      cursor: pointer; 
      font-size: 0.9375rem;
      min-height: 44px;
    }
    
    .checkbox-group input[type="checkbox"] { 
      width: 20px; 
      height: 20px; 
      cursor: pointer;
      margin: 0;
    }
    
    .form-actions { 
      display: flex; 
      gap: 0.75rem; 
      margin-top: 1.5rem; 
      flex-wrap: wrap;
    }
    
    .form-actions button {
      flex: 1 1 auto;
      min-width: 120px;
    }
    
    .status { 
      padding: 0.875rem 1rem; 
      border-radius: 5px; 
      margin-bottom: 1.25rem; 
      border-left: 4px solid;
      font-weight: 500;
    }
    
    .status.success { 
      background: #d1fae5; 
      color: #065f46; 
      border-left-color: #10b981;
    }
    
    .status.error { 
      background: #fee2e2; 
      color: #991b1b; 
      border-left-color: #ef4444;
    }
    
    .status.info { 
      background: #dbeafe; 
      color: #1e40af; 
      border-left-color: #3b82f6;
    }
    
    .spinner { 
      display: inline-block; 
      width: 14px; 
      height: 14px; 
      border: 2px solid #f3f4f6; 
      border-top: 2px solid #00ad9f; 
      border-radius: 50%; 
      animation: spin 1s linear infinite; 
    }
    
    @keyframes spin { 
      0% { transform: rotate(0deg); } 
      100% { transform: rotate(360deg); } 
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const STORAGE_KEY = 'netlify-cms-posts';
    const MASTODON_CHAR_LIMIT = 500;
    const THREADS_CHAR_LIMIT = 500;
    
    let state = {
      posts: [],
      isAuth: false,
      user: null,
      token: null,
      editing: null,
      status: null,
      syncing: false,
      activeTab: 'blog',
      mastodonInstance: localStorage.getItem('mastodon_instance') || '',
      mastodonToken: localStorage.getItem('mastodon_token') || '',
      threadsToken: localStorage.getItem('threads_token') || ''
    };

    async function init() {
      // Initialize Netlify Identity
      netlifyIdentity.on('init', user => {
        if (user) {
          state.user = user;
          state.token = user.token.access_token;
          state.isAuth = true;
        }
      });

      netlifyIdentity.on('login', user => {
        state.user = user;
        state.token = user.token.access_token;
        state.isAuth = true;
        netlifyIdentity.close();
        render();
      });

      netlifyIdentity.on('logout', () => {
        state.user = null;
        state.token = null;
        state.isAuth = false;
        render();
      });
      
      // Load posts from storage
      try {
        const result = await window.storage.get(STORAGE_KEY);
        if (result && result.value) {
          state.posts = JSON.parse(result.value);
        }
      } catch (e) {
        state.posts = [];
      }
      
      render();
    }

    async function save() {
      try {
        await window.storage.set(STORAGE_KEY, JSON.stringify(state.posts));
        const backupKey = STORAGE_KEY + '_backup_' + new Date().toISOString().split('T')[0];
        await window.storage.set(backupKey, JSON.stringify(state.posts));
      } catch (e) {
        console.error('Save failed:', e);
        state.status = { type: 'error', msg: 'Failed to save: ' + e.message };
        render();
      }
    }

    async function syncToNetlify() {
      state.syncing = true;
      state.status = { type: 'info', msg: 'Syncing to Netlify...' };
      render();
      
      try {
        const publishedPosts = state.posts.filter(function(p) {
          if (p.type === 'blog') return p.status === 'published';
          if (p.type === 'note') return p.status === 'posted';
          return p.status === 'published';
        });
        
        const allDrafts = state.posts.filter(function(p) {
          if (p.type === 'blog') return p.status === 'draft';
          if (p.type === 'note') return p.status === 'draft';
          return p.status === 'draft';
        });
        
        // Call Netlify function to update files
        const response = await fetch('/.netlify/functions/sync-posts', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + state.token,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            posts: publishedPosts,
            drafts: allDrafts
          })
        });
        
        if (response.ok) {
          state.status = { type: 'success', msg: 'Successfully synced! Site will rebuild automatically.' };
          state.posts.forEach(p => p.synced = true);
          await save();
        } else {
          const error = await response.json();
          state.status = { type: 'error', msg: 'Sync failed: ' + (error.message || 'Unknown error') };
        }
      } catch (e) {
        state.status = { type: 'error', msg: 'Sync failed: ' + e.message };
      }
      
      state.syncing = false;
      render();
    }

    async function postToMastodon(content) {
      if (!state.mastodonInstance || !state.mastodonToken) {
        state.status = { type: 'error', msg: 'Mastodon not configured.' };
        render();
        return false;
      }

      try {
        const response = await fetch('https://' + state.mastodonInstance + '/api/v1/statuses', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + state.mastodonToken,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            status: content,
            visibility: 'public'
          })
        });

        if (response.ok) {
          return true;
        } else {
          const error = await response.json();
          state.status = { type: 'error', msg: 'Mastodon post failed: ' + (error.error || 'Unknown error') };
          render();
          return false;
        }
      } catch (e) {
        state.status = { type: 'error', msg: 'Mastodon post failed: ' + e.message };
        render();
        return false;
      }
    }

    async function postToThreads(content) {
      if (!state.threadsToken) {
        state.status = { type: 'error', msg: 'Threads not configured.' };
        render();
        return false;
      }

      try {
        const createResponse = await fetch('https://graph.threads.net/v1.0/me/threads', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + state.threadsToken,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            media_type: 'TEXT',
            text: content
          })
        });

        if (createResponse.ok) {
          const createData = await createResponse.json();
          
          const publishResponse = await fetch('https://graph.threads.net/v1.0/me/threads_publish', {
            method: 'POST',
            headers: {
              'Authorization': 'Bearer ' + state.threadsToken,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              creation_id: createData.id
            })
          });

          if (publishResponse.ok) {
            return true;
          }
        }
        
        state.status = { type: 'error', msg: 'Threads post failed' };
        render();
        return false;
      } catch (e) {
        state.status = { type: 'error', msg: 'Threads post failed: ' + e.message };
        render();
        return false;
      }
    }

    function render() {
      const root = document.getElementById('root');
      root.innerHTML = state.isAuth ? (state.editing ? editorView() : mainView()) : loginView();
    }

    function loginView() {
      return '<div class="login"><h1>🚀 Netlify CMS</h1><p>Manage blog posts and social media notes in one place.</p><button onclick="login()">Login with Netlify Identity</button><div class="note"><strong>Features:</strong><br>• Write blog posts synced to your site<br>• Post short notes to Mastodon & Threads<br>• Auto-trigger site rebuilds</div></div>';
    }

    function mainView() {
      let statusHTML = '';
      if (state.status) {
        statusHTML = '<div class="status ' + state.status.type + '">' + state.status.msg + '</div>';
      }

      const blogPosts = state.posts.filter(function(p) { return p.type === 'blog' || !p.type; });
      const notes = state.posts.filter(function(p) { return p.type === 'note'; });
      
      const published = blogPosts.filter(function(p) { return p.status === 'published'; });
      const drafts = blogPosts.filter(function(p) { return p.status === 'draft'; });
      const noteDrafts = notes.filter(function(p) { return p.status === 'draft'; });
      const readyNotes = notes.filter(function(p) { return p.status !== 'draft'; });
      
      let pubHTML = '';
      if (published.length === 0) {
        pubHTML = '<p class="empty">No published posts</p>';
      } else {
        for (let i = 0; i < published.length; i++) {
          pubHTML += postCard(published[i], false);
        }
      }
      
      let draftHTML = '';
      if (drafts.length === 0) {
        draftHTML = '<p class="empty">No drafts</p>';
      } else {
        for (let i = 0; i < drafts.length; i++) {
          draftHTML += postCard(drafts[i], true);
        }
      }

      let notesHTML = '';
      if (readyNotes.length === 0 && noteDrafts.length === 0) {
        notesHTML = '<p class="empty">No notes yet</p>';
      } else {
        if (noteDrafts.length > 0) {
          notesHTML += '<h3 style="color:#666;font-size:14px;margin-bottom:10px;margin-top:20px;">Drafts (' + noteDrafts.length + ')</h3>';
          for (let i = 0; i < noteDrafts.length; i++) {
            notesHTML += noteCard(noteDrafts[i], true);
          }
        }
        if (readyNotes.length > 0) {
          notesHTML += '<h3 style="color:#666;font-size:14px;margin-bottom:10px;margin-top:20px;">Posted (' + readyNotes.length + ')</h3>';
          for (let i = 0; i < readyNotes.length; i++) {
            notesHTML += noteCard(readyNotes[i], false);
          }
        }
      }

      const unsyncedCount = state.posts.filter(function(p) { return !p.synced; }).length;
      const syncBtnText = state.syncing ? '<span class="spinner"></span> Syncing...' : '🔄 Sync to Site' + (unsyncedCount > 0 ? ' (' + unsyncedCount + ')' : '');

      const blogView = '<div class="buttons"><button class="btn-primary" onclick="newPost(\'blog\')">➕ New Blog Post</button><button class="btn-secondary" onclick="syncToNetlify()" ' + (state.syncing ? 'disabled' : '') + '>' + syncBtnText + '</button><button class="btn-outline" onclick="exportPosts()">💾 Export JSON</button></div><div class="grid"><div class="section"><h2>Published (' + published.length + ')</h2>' + pubHTML + '</div><div class="section"><h2>Drafts (' + drafts.length + ')</h2>' + draftHTML + '</div></div>';

      const notesView = '<div class="buttons"><button class="btn-primary" onclick="newPost(\'note\')">➕ New Note</button><button class="btn-outline" onclick="showSettings()">⚙️ Social Settings</button></div><div style="margin-top:20px;"><div class="section"><h2>Notes (' + notes.length + ')</h2>' + notesHTML + '</div></div>';

      const userName = state.user.user_metadata ? (state.user.user_metadata.full_name || state.user.email) : state.user.email;

      return '<div class="app"><div class="main">' + statusHTML + '<div class="header"><div><h1>Content Manager</h1></div><div><div class="user-info"><span>' + userName + '</span><button class="btn-outline" onclick="logout()">Logout</button></div></div></div><div class="tabs"><button class="tab ' + (state.activeTab === 'blog' ? 'active' : '') + '" onclick="switchTab(\'blog\')">📝 Blog Posts</button><button class="tab ' + (state.activeTab === 'notes' ? 'active' : '') + '" onclick="switchTab(\'notes\')">💭 Notes</button></div>' + (state.activeTab === 'blog' ? blogView : notesView) + '</div></div>';
    }

    function postCard(post, isDraft) {
      const date = new Date(post.updatedAt).toLocaleDateString();
      const cls = isDraft ? ' draft' : (post.synced ? ' synced' : '');
      const syncBadge = post.synced ? '' : '<span style="color:#ffc107;font-size:11px;"> ● unsaved</span>';
      return '<div class="post' + cls + '"><h3>' + esc(post.title) + syncBadge + '</h3><p class="post-date">' + date + '</p><div class="post-actions"><button onclick="edit(\'' + post.id + '\')">Edit</button><button class="delete" onclick="del(\'' + post.id + '\')">Delete</button></div></div>';
    }

    function noteCard(note, isDraft) {
      const date = new Date(note.updatedAt).toLocaleDateString();
      let badges = '';
      if (note.postedToMastodon) badges += '<span class="badge mastodon">Mastodon</span>';
      if (note.postedToThreads) badges += '<span class="badge threads">Threads</span>';
      if (isDraft) badges += '<span class="badge">Draft</span>';
      
      const cls = isDraft ? ' draft' : ' note';
      
      return '<div class="post' + cls + '"><h3>' + esc(note.content.substring(0, 60)) + (note.content.length > 60 ? '...' : '') + '</h3><div class="post-meta">' + badges + '</div><p class="post-date">' + date + '</p><div class="post-actions"><button onclick="edit(\'' + note.id + '\')">Edit</button>' + (isDraft ? '<button onclick="postDraft(\'' + note.id + '\')">Post Now</button>' : '') + '<button class="delete" onclick="del(\'' + note.id + '\')">Delete</button></div></div>';
    }

    function editorView() {
      const isNew = !state.editing.createdAt;
      const isNote = state.editing.type === 'note';
      
      if (isNote) {
        const charCount = (state.editing.content || '').length;
        const mastodonOver = charCount > MASTODON_CHAR_LIMIT;
        const threadsOver = charCount > THREADS_CHAR_LIMIT;
        const countClass = mastodonOver || threadsOver ? 'error' : (charCount > MASTODON_CHAR_LIMIT * 0.9 ? 'warning' : '');
        
        return '<div class="app"><div class="main"><div class="editor"><h2>' + (isNew ? 'New Note' : 'Edit Note') + '</h2><div class="form-group"><label>Content</label><textarea id="content" class="short" oninput="updateCharCount()">' + esc(state.editing.content || '') + '</textarea><div class="char-count ' + countClass + '" id="char-count">' + charCount + ' / ' + MASTODON_CHAR_LIMIT + ' characters</div></div><div class="form-group"><label>Status</label><select id="note-status"><option value="draft"' + (state.editing.status === 'draft' ? ' selected' : '') + '>Save as Draft</option><option value="ready">Ready to Post</option></select></div><div class="form-group"><label>Post to:</label><div class="checkbox-group"><label><input type="checkbox" id="post-mastodon" ' + (state.editing.postToMastodon ? 'checked' : '') + '> Mastodon</label><label><input type="checkbox" id="post-threads" ' + (state.editing.postToThreads ? 'checked' : '') + '> Threads</label></div></div><div class="form-actions"><button class="btn-primary" onclick="saveNote()">💾 Save</button><button class="btn-secondary" onclick="saveAndPost()">📤 Save & Post Now</button><button class="btn-outline" onclick="cancel()">Cancel</button></div></div></div></div>';
      } else {
        return '<div class="app"><div class="main"><div class="editor"><h2>' + (isNew ? 'New Blog Post' : 'Edit Post') + '</h2><div class="form-group"><label>Title</label><input type="text" id="title" value="' + esc(state.editing.title || '') + '"></div><div class="form-group"><label>Content (Markdown supported)</label><textarea id="content">' + esc(state.editing.content || '') + '</textarea></div><div class="form-group"><label>Status</label><select id="status"><option value="draft"' + (state.editing.status === 'draft' ? ' selected' : '') + '>Draft</option><option value="published"' + (state.editing.status === 'published' ? ' selected' : '') + '>Published</option></select></div><div class="form-actions"><button class="btn-primary" onclick="savePost()">💾 Save</button><button class="btn-outline" onclick="cancel()">Cancel</button></div></div></div></div>';
      }
    }

    function updateCharCount() {
      const content = document.getElementById('content').value;
      const charCount = content.length;
      const countEl = document.getElementById('char-count');
      
      if (charCount > MASTODON_CHAR_LIMIT) {
        countEl.className = 'char-count error';
      } else if (charCount > MASTODON_CHAR_LIMIT * 0.9) {
        countEl.className = 'char-count warning';
      } else {
        countEl.className = 'char-count';
      }
      
      countEl.textContent = charCount + ' / ' + MASTODON_CHAR_LIMIT + ' characters';
    }

    function showSettings() {
      const instance = prompt('Enter your Mastodon instance (e.g., mastodon.social):', state.mastodonInstance);
      if (instance !== null) {
        state.mastodonInstance = instance;
        localStorage.setItem('mastodon_instance', instance);
      }
      
      const mastodonToken = prompt('Enter your Mastodon access token:', state.mastodonToken);
      if (mastodonToken !== null) {
        state.mastodonToken = mastodonToken;
        localStorage.setItem('mastodon_token', mastodonToken);
      }
      
      const threadsToken = prompt('Enter your Threads access token:', state.threadsToken);
      if (threadsToken !== null) {
        state.threadsToken = threadsToken;
        localStorage.setItem('threads_token', threadsToken);
      }
      
      state.status = { type: 'success', msg: 'Settings saved!' };
      render();
    }

    function switchTab(tab) {
      state.activeTab = tab;
      state.status = null;
      render();
    }

    function login() {
      netlifyIdentity.open();
    }

    function logout() {
      netlifyIdentity.logout();
    }

    function newPost(type) {
      state.editing = { 
        id: Date.now().toString(), 
        type: type,
        title: '', 
        content: '', 
        status: 'draft', 
        createdAt: new Date().toISOString(), 
        updatedAt: new Date().toISOString(),
        synced: false,
        postToMastodon: type === 'note',
        postToThreads: type === 'note'
      };
      render();
    }

    function edit(id) {
      state.editing = state.posts.find(function(p) { return p.id === id; });
      render();
    }

    async function savePost() {
      const title = document.getElementById('title').value;
      const content = document.getElementById('content').value;
      const status = document.getElementById('status').value;
      
      if (!title.trim()) {
        alert('Title required');
        return;
      }
      
      state.editing.title = title;
      state.editing.content = content;
      state.editing.status = status;
      state.editing.updatedAt = new Date().toISOString();
      state.editing.synced = false;
      
      const idx = state.posts.findIndex(function(p) { return p.id === state.editing.id; });
      if (idx >= 0) {
        state.posts[idx] = state.editing;
      } else {
        state.posts.push(state.editing);
      }
      
      await save();
      state.editing = null;
      state.status = { type: 'success', msg: 'Post saved! Click "Sync to Site" to publish.' };
      render();
    }

    async function saveNote() {
      const content = document.getElementById('content').value;
      const noteStatus = document.getElementById('note-status').value;
      
      if (!content.trim()) {
        alert('Content required');
        return;
      }
      
      state.editing.content = content;
      state.editing.status = noteStatus;
      state.editing.updatedAt = new Date().toISOString();
      state.editing.synced = false;
      
      const idx = state.posts.findIndex(p => p.id === state.editing.id);
      if (idx >= 0) {
        state.posts[idx] = state.editing;
      } else {
        state.posts.push(state.editing);
      }
      
      await save();
      state.editing = null;
      state.status = { type: 'success', msg: 'Note saved as ' + noteStatus + '!' };
      render();
    }

    async function saveAndPost() {
      const content = document.getElementById('content').value;
      const postMastodon = document.getElementById('post-mastodon').checked;
      const postThreads = document.getElementById('post-threads').checked;
      
      if (!content.trim()) {
        alert('Content required');
        return;
      }
      
      if (content.length > MASTODON_CHAR_LIMIT && postMastodon) {
        alert('Content exceeds Mastodon character limit (' + MASTODON_CHAR_LIMIT + ')');
        return;
      }
      
      if (content.length > THREADS_CHAR_LIMIT && postThreads) {
        alert('Content exceeds Threads character limit (' + THREADS_CHAR_LIMIT + ')');
        return;
      }
      
      state.editing.content = content;
      state.editing.status = 'posted';
      state.editing.updatedAt = new Date().toISOString();
      state.editing.synced = false;
      
      let posted = [];
      
      if (postMastodon) {
        const success = await postToMastodon(content);
        if (success) {
          state.editing.postedToMastodon = true;
          posted.push('Mastodon');
        }
      }
      
      if (postThreads) {
        const success = await postToThreads(content);
        if (success) {
          state.editing.postedToThreads = true;
          posted.push('Threads');
        }
      }
      
      const idx = state.posts.findIndex(p => p.id === state.editing.id);
      if (idx >= 0) {
        state.posts[idx] = state.editing;
      } else {
        state.posts.push(state.editing);
      }
      
      await save();
      state.editing = null;
      
      if (posted.length > 0) {
        state.status = { type: 'success', msg: 'Note posted to ' + posted.join(' and ') + '!' };
      } else {
        state.status = { type: 'info', msg: 'Note saved but not posted to any platform.' };
      }
      
      render();
    }

    async function postDraft(id) {
      const note = state.posts.find(function(p) { return p.id === id; });
      if (!note) return;
      
      state.editing = note;
      await saveAndPost();
    }

    function cancel() {
      state.editing = null;
      state.status = null;
      render();
    }

    async function del(id) {
      if (confirm('Delete this item?')) {
        state.posts = state.posts.filter(function(p) { return p.id !== id; });
        await save();
        render();
      }
    }

    function exportPosts() {
      const blob = new Blob([JSON.stringify(state.posts, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'posts.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    function esc(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    init();
  </script>
</body>
</html>
